  return '<a class="ref" href="'+esc(url)+'" target="_blank"><div class="thumb">'+thumb+'</div><strong>'+esc(title)+'</strong><small>'+esc(ff11Host(url))+'</small></a>';
}
function ff11BuildInteractiveProjectHtml(proj){
  const data=JSON.stringify(proj).replace(/<\/script/gi,'<\\/script');
  const css=':root{color-scheme:dark}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#09090b;color:#fafafa}button,a{font:inherit}header{position:sticky;top:0;background:rgba(9,9,11,.9);backdrop-filter:blur(16px);border-bottom:1px solid #27272a;padding:18px 22px;z-index:2}main{display:grid;grid-template-columns:260px minmax(0,1fr);gap:0;min-height:calc(100vh - 76px)}h1{font-size:24px;margin:0 0 4px}.meta{color:#a1a1aa;font-size:13px}.side{border-right:1px solid #27272a;padding:18px;background:#0f0f11}.stage-btn{width:100%;text-align:left;border:1px solid #27272a;background:#18181b;color:#fafafa;border-radius:10px;padding:11px 12px;margin-bottom:8px;cursor:pointer}.stage-btn.active{border-color:#fafafa;background:#27272a}.content{padding:24px;max-width:980px}.panel{border:1px solid #27272a;background:#18181b;border-radius:14px;padding:18px;margin-bottom:14px}.panel h2{margin:0 0 8px;font-size:22px}.section{margin-top:18px}.section h3{font-size:11px;color:#a1a1aa;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px}.note{white-space:pre-wrap;line-height:1.6;color:#e4e4e7;background:#09090b;border:1px solid #27272a;border-radius:10px;padding:12px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}.grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;border:1px solid #27272a}.colors{display:flex;gap:8px;flex-wrap:wrap}.sw{width:44px;height:44px;border-radius:9px;border:1px solid #3f3f46}.refs{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}.ref{color:#fafafa;text-decoration:none;border:1px solid #27272a;background:#09090b;border-radius:10px;overflow:hidden;display:block}.ref .thumb{height:105px;background:#27272a;display:flex;align-items:center;justify-content:center;color:#a1a1aa;font-size:12px;overflow:hidden}.ref img{width:100%;height:100%;object-fit:cover}.ref strong,.ref small{display:block;padding:10px 12px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ref small{padding-top:3px;padding-bottom:12px;color:#a1a1aa;font-size:11px}.outcome{border:1px solid #27272a;background:#09090b;border-radius:12px;padding:12px}.outcome img{max-width:100%;border-radius:8px}@media(max-width:760px){main{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid #27272a;display:flex;overflow:auto;gap:8px}.stage-btn{min-width:170px}}';
  const body='<header><h1 id="title"></h1><div class="meta" id="meta"></div></header><main><aside class="side" id="stages"></aside><section class="content" id="content"></section></main>';
  const js=`const PROJECT=${data};const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));let active=(PROJECT.stages&&PROJECT.stages[0]&&PROJECT.stages[0].id)||'';function host(u){try{return new URL(u).hostname.replace(/^www\\./,'')}catch(e){return u||'Reference'}}function yt(u){let m=String(u||'').match(/[?&]v=([^&]+)/);if(m)return m[1];m=String(u||'').match(/youtu\\.be\\/([^?&#]+)/);return m?m[1]:''}function img(u){return /^data:image\\//i.test(u)||/\\.(png|jpe?g|gif|webp|avif|svg)(\\?.*)?$/i.test(u||'')}function ref(r){const u=r.url||'';const th=img(u)?'<img src="'+esc(u)+'">':(yt(u)?'<img src="https://img.youtube.com/vi/'+esc(yt(u))+'/hqdefault.jpg">':'<span>'+esc(host(u))+'</span>');return '<a class="ref" href="'+esc(u)+'" target="_blank"><div class="thumb">'+th+'</div><strong>'+esc(r.title||host(u))+'</strong><small>'+esc(host(u))+'</small></a>'}function section(name,html){return html?'<div class="section"><h3>'+name+'</h3>'+html+'</div>':''}function render(){document.getElementById('title').textContent=PROJECT.name||'Flow First Project';document.getElementById('meta').textContent=(PROJECT.type||'Project')+' / '+((PROJECT.stages||[]).length)+' stages';document.getElementById('stages').innerHTML=(PROJECT.stages||[]).map(s=>'<button class="stage-btn '+(s.id===active?'active':'')+'" data-id="'+s.id+'">'+esc(s.name||'Stage')+'</button>').join('');const st=(PROJECT.stages||[]).find(s=>s.id===active)||(PROJECT.stages||[])[0];const t=(PROJECT.stageTools||{})[st?.id]||{};let h='<div class="panel"><h2>'+esc(st?.name||'Stage')+'</h2><div class="meta">'+(st?.completed?'Complete':'In progress')+'</div>';if(t.journal)h+=section('Journal','<div class="note">'+esc(t.journal)+'</div>');const imgs=(t.moodboard||[]).filter(x=>x.type==='image');if(imgs.length)h+=section('Moodboard','<div class="grid">'+imgs.map(x=>'<img src="'+x.data+'">').join('')+'</div>');if(t.colors&&t.colors.length)h+=section('Colors','<div class="colors">'+t.colors.map(c=>'<div class="sw" style="background:'+esc(c)+'"></div>').join('')+'</div>');if(t.references&&t.references.length)h+=section('References','<div class="refs">'+t.references.map(ref).join('')+'</div>');if(t.outcomes&&t.outcomes.length)h+=section('Outcomes',t.outcomes.map(o=>'<div class="outcome"><img src="'+esc(o.image||'')+'">'+(o.annotation?'<p>'+esc(o.annotation)+'</p>':'')+'</div>').join(''));h+='</div>';document.getElementById('content').innerHTML=h;document.querySelectorAll('.stage-btn').forEach(b=>b.onclick=()=>{active=b.dataset.id;render()})}render();`;
  return '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+esc(proj.name||'Flow First Project')+'</title><style>'+css+'</style></head><body>'+body+'<script>'+js+'<\/script></body></html>';
}
function ff11ProjectShareUrl(proj){
  const base=location.href.split('#')[0];
  const payload=ff11Base64Encode(JSON.stringify(proj));
  return base+'#ffshare='+encodeURIComponent(payload);
}
function ff11DownloadHtml(html,name){
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),30000);
}
exportProject=function(){
  const proj=getProject(S.currentProjectId);if(!proj)return;
  const html=ff11BuildInteractiveProjectHtml(proj);
  ff11DownloadHtml(html,ff11SafeFileName(proj.savedName||proj.name)+'_interactive_preview.html');
  window.open('https://onedrive.live.com/?id=root','_blank');
  toast('Interactive preview downloaded. OneDrive is open for upload.','success');
};
function ff11ShareProject(){
  const proj=getProject(S.currentProjectId);if(!proj)return;
  const html=ff11BuildInteractiveProjectHtml(proj);
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  FF11.share={projId:proj.id,html,url,hashUrl:ff11ProjectShareUrl(proj)};
  openModal('<div class="modal-header"><h3>Share Project</h3><button class="btn btn-icon btn-sm btn-ghost" data-action="close-modal"><i class="fas fa-xmark"></i></button></div><div class="modal-body"><p style="color:var(--text-sec);font-size:13px;margin-bottom:14px">This creates an interactive HTML preview and a WhatsApp link that carries the project data inside the link.</p><div class="share-options"><div class="share-option" data-action="ff11-share-preview"><i class="fas fa-eye"></i><span>Preview interactive HTML</span></div><div class="share-option" data-action="ff11-share-download"><i class="fas fa-download"></i><span>Download HTML preview</span></div><div class="share-option" data-action="ff11-share-copy"><i class="fas fa-link"></i><span>Copy project link</span></div><div class="share-option" data-action="ff11-share-email"><i class="fas fa-envelope"></i><span>Email</span></div><div class="share-option" data-action="ff11-share-whatsapp"><i class="fab fa-whatsapp"></i><span>WhatsApp full project</span></div></div><div class="ff11-share-note"><i class="fas fa-circle-info"></i> Very image-heavy projects can make the WhatsApp link long. The HTML preview is the most reliable option for large projects.</div></div>');
}
function ff11ImportHashProject(){
  const m=(location.hash||'').match(/ffshare=([^&]+)/);
  if(!m)return;
  try{
    const proj=JSON.parse(ff11Base64Decode(decodeURIComponent(m[1])));
    if(!proj||!proj.id)throw new Error('Missing project');
    if(!Array.isArray(S.projects))S.projects=[];
    const old=S.projects.findIndex(p=>p.id===proj.id);
    if(old>=0)S.projects[old]=proj;else S.projects.unshift(proj);
    S.currentProjectId=proj.id;
    S.currentStageId=proj.stages?.[0]?.id||null;
    S.view='project';
    saveState();
    try{history.replaceState(null,'',location.pathname+location.search)}catch(e){}
    setTimeout(()=>toast('Shared project loaded','success'),300);
  }catch(e){setTimeout(()=>toast('Could not load shared project link','error'),300)}
}

function ff11StageContext(){
  const proj=getProject(S.currentProjectId);if(!proj)return null;
  const sid=S.currentStageId||proj.stages?.[0]?.id;if(!sid)return null;

}
function ff11OpenReferenceBankTool(data,ctx,pid,sid){
  if(!data.references)data.references=[];

  openModal(toolHdr('Reference Bank','save-references')+'<div class="modal-body"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><input class="input" id="ff11-ref-title" placeholder="Reference title"><input class="input" id="ff11-ref-url" placeholder="https://..."></div><button class="btn btn-sm" data-action="ff11-add-reference"><i class="fas fa-plus"></i> Add reference</button><div class="ff11-ref-draft" id="ff11-ref-draft"></div>'+list+'</div>','modal-lg');
}
function ff11AddReference(){
  const td=window._currentToolData;if(!td)return;

  const title=document.getElementById('ff11-ref-title')?.value.trim()||'';
  const url=ff11NormalizeUrl(document.getElementById('ff11-ref-url')?.value||'');
  if(!url){toast('Paste a link','error');return}
  td.references.push({title:title||ff11Host(url),url,createdAt:Date.now()});

  const c=window._currentToolCtx||{};

}
function ff11RemoveReference(i){
  const td=window._currentToolData;if(!td?.references)return;

function ff11UpdateReferenceDraft(){

window.addEventListener('click',function(e){
  const b=e.target.closest('[data-action]');if(!b)return;
  const a=b.dataset.action,d=b.dataset;
  if(a==='share-project'){e.preventDefault();e.stopImmediatePropagation();ff11ShareProject();return}
  if(a==='ff11-share-preview'){e.preventDefault();e.stopImmediatePropagation();if(FF11.share?.url)window.open(FF11.share.url,'_blank');return}
  if(a==='ff11-share-download'){e.preventDefault();e.stopImmediatePropagation();const proj=getProject(S.currentProjectId);if(proj&&FF11.share?.html)ff11DownloadHtml(FF11.share.html,ff11SafeFileName(proj.savedName||proj.name)+'_interactive_preview.html');return}
  if(a==='ff11-share-copy'){e.preventDefault();e.stopImmediatePropagation();navigator.clipboard?.writeText(FF11.share?.hashUrl||'').then(()=>toast('Project link copied','success'));return}
  if(a==='ff11-share-email'){e.preventDefault();e.stopImmediatePropagation();const proj=getProject(S.currentProjectId);window.open('mailto:?subject='+encodeURIComponent('Flow First project: '+(proj?.name||''))+'&body='+encodeURIComponent(FF11.share?.hashUrl||''));return}
  if(a==='ff11-share-whatsapp'){e.preventDefault();e.stopImmediatePropagation();window.open('https://wa.me/?text='+encodeURIComponent('Open this Flow First project: '+(FF11.share?.hashUrl||'')),'_blank');return}
  if(a==='ff11-quick-date'){e.preventDefault();e.stopImmediatePropagation();const picked=d.date||'';FF11.quickDate=FF11.quickDate===picked?'':picked;document.querySelectorAll('.ff11-chip').forEach(x=>x.classList.toggle('active',x.dataset.date===FF11.quickDate));document.getElementById('ff11-quick-input')?.focus();return}
  if(a==='ff11-quick-add'){e.preventDefault();e.stopImmediatePropagation();const inp=document.getElementById('ff11-quick-input');if(!inp)return;const parsed=ff11ParseQuickTask(inp.value,FF11.quickDate);if(!parsed.text){toast('Type a task first','error');return}const cl=ff11EnsureMyTasks();cl.items.push({id:uid(),text:parsed.text,done:false,dueAt:parsed.dueAt,notify:false,notified:false,importance:parsed.importance});saveState();inp.value='';render();toast('Task added to My Tasks','success');return}
  if(a==='open-stage-tool'&&d.tool==='referencebank'){e.preventDefault();e.stopImmediatePropagation();const ctx=ff11StageContext();if(!ctx)return;window._currentToolData=ctx.tools;window._currentToolCtx={ctx:'stage',pid:ctx.proj.id,sid:ctx.sid};ff11OpenReferenceBankTool(ctx.tools,'stage',ctx.proj.id,ctx.sid);return}
  if(a==='ff11-add-reference'){e.preventDefault();e.stopImmediatePropagation();ff11AddReference();return}
  if(a==='ff11-remove-reference'){e.preventDefault();e.stopImmediatePropagation();ff11RemoveReference(parseInt(d.ri,10));return}
  if(a==='ff11-open-url'){e.preventDefault();e.stopImmediatePropagation();window.open(d.url,'_blank');return}
  if(a==='save-references'&&document.querySelector('#ff11-ref-url')){e.preventDefault();e.stopImmediatePropagation();persistToolData();closeModal();toast('References saved','success');render();return}
},true);
window.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&e.target&&e.target.id==='ff11-quick-input'){e.preventDefault();document.querySelector('[data-action="ff11-quick-add"]')?.click()}
},true);
window.addEventListener('input',function(e){
  if(e.target&&/ff11-ref-(title|url)/.test(e.target.id))ff11UpdateReferenceDraft();
},true);
['click','pointerup','transitionend'].forEach(evt=>window.addEventListener(evt,()=>setTimeout(ff11ReapplyWidgetPositions,0),true));
setInterval(()=>{try{ff11ReapplyWidgetPositions()}catch(e){}},900);
})();

/* ============ INIT ============ */
loadState();
if(S.user){if(S.view==='auth')S.view='home';if(S.view==='project'&&!getProject(S.currentProjectId))S.view='home'}
render();
